[audio]
enable_sounds = true
sound_volume = 0.99999997764825821

[backdrop]
blur_intensity = 0.7799999825656414
enabled = true

[bar.default]
capsule = true
capsule_opacity = 0.5599999874830246
end = [ "audio_visualizer", "tray", "network", "battery" ]
font_weight = 380
margin_edge = 5
margin_ends = 5
padding = 0
position = "right"
radius = 14
scale = 1.300000011920929
start = [ "workspaces", "sysmon" ]
thickness = 37
widget_spacing = 5

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "caffeine"

[[control_center.shortcuts]]
type = "nightlight"

[[control_center.shortcuts]]
type = "notification"

[desktop_widgets]
schema_version = 1
widget_order = [ "desktop-widget-0000000000000002", "desktop-widget-0000000000000001" ]

    [desktop_widgets.grid]
    cell_size = 8
    major_interval = 4
    visible = true

    [desktop_widgets.widget.desktop-widget-0000000000000001]
    box_height = 160.0
    box_width = 376.0
    cx = 244.0
    cy = 736.0
    output = "eDP-1"
    rotation = 0.0
    type = "media_player"

        [desktop_widgets.widget.desktop-widget-0000000000000001.settings]
        background = true
        background_color = "surface"
        background_opacity = 1.0
        background_padding = 13.0
        background_radius = 11.0
        hide_when_no_media = true
        layout = "horizontal"

    [desktop_widgets.widget.desktop-widget-0000000000000002]
    box_height = 440.0
    box_width = 1056.0
    cx = 528.0
    cy = 88.0
    flip_y = true
    output = "eDP-1"
    rotation = 0.0
    type = "audio_visualizer"

        [desktop_widgets.widget.desktop-widget-0000000000000002.settings]
        aspect_ratio = 6.0
        background = false
        background_opacity = 0.029999999999999999
        background_padding = 0.0
        background_radius = 0.0
